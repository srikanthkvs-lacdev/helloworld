<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We Welcome LAC Dev</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Noto Sans Telugu', sans-serif;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 700px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    p {
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.6;
      text-shadow: 0 2px 12px rgba(245, 166, 35, 0.4);
    }

    p span {
      color: #f5a623;
    }

    .qr-section {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-section p {
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-shadow: none;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .download-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 36px;
      background: #f5a623;
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 900;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(245,166,35,0.4);
    }

    .download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245,166,35,0.6);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="card">
    <p>We Welcome <span>LAC Dev</span></p>
    <a class="download-btn" href="test.pdf" download>&#8675; Download Test PDF</a>
    <div class="qr-section">
      <p>Scan to visit this site</p>
      <div id="qrcode"></div>
    </div>
  </div>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://srikanthkvs-lacdev.github.io/helloworld/",
      width: 160,
      height: 160,
      colorDark: "#302b63",
      colorLight: "#ffffff",
    });
  </script>
</body>
</html>
