<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mytest Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3.5rem;
      color: #fff;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    h1 span { color: #f5a623; }
    .subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .divider {
      width: 80px;
      height: 3px;
      background: #f5a623;
      margin: 0 auto 40px;
      border-radius: 2px;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: #f5a623;
      color: #1a1a2e;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(245,166,35,0.4);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245,166,35,0.6);
    }
    footer {
      position: fixed;
      bottom: 16px;
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>Welcome to <span>Mytest Page</span></h1>
  <p class="subtitle">Discover the world's greatest landmarks</p>
  <div class="divider"></div>
  <a class="btn" href="wonders.html">&#127758; Explore 7 Wonders of the World</a>
  <footer>&copy; 2026 Mytest Page</footer>
</body>
</html>
