<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome KVS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .container {
      text-align: center;
      padding: 60px 80px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 3.5rem;
      color: #ffffff;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    h1 span {
      color: #e94560;
    }
    p {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
      margin-top: 10px;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #e94560;
      border-radius: 50%;
      margin: 20px auto 0;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome <span>KVS</span></h1>
    <p>Your project is live on GitHub Pages</p>
    <div class="dot"></div>
  </div>
</body>
</html>
