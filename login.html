<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Srikanth App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #4f46e5;
    }

    input.error {
      border-color: #ef4444;
    }

    .error-msg {
      font-size: 0.78rem;
      color: #ef4444;
      margin-top: 4px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 18px;
    }

    .forgot a {
      font-size: 0.82rem;
      color: #4f46e5;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #4338ca;
    }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 18px;
      display: none;
    }

    .alert.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      display: block;
    }

    .alert.fail {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }

    .signup {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: #6b7280;
    }

    .signup a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .signup a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Srikanth App</h1>
    <p class="subtitle">Sign in to your account</p>

    <div id="alert" class="alert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <div class="error-msg" id="emailError">Please enter a valid email address.</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <div class="error-msg" id="passwordError">Password must be at least 6 characters.</div>
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Sign in</button>
    </form>

    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
  </div>

  <script>
    const API = "http://localhost:8080/api";

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const alertEl = document.getElementById("alert");

    function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function setError(input, el, msg) {
      input.classList.add("error"); el.textContent = msg; el.classList.add("show");
    }
    function clearError(input, el) {
      input.classList.remove("error"); el.classList.remove("show");
    }
    function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = "alert " + type; }
    function hideAlert() { alertEl.className = "alert"; }

    emailInput.addEventListener("input",    () => clearError(emailInput, emailError));
    passwordInput.addEventListener("input", () => clearError(passwordInput, passwordError));

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideAlert();

      const email    = emailInput.value.trim();
      const password = passwordInput.value;
      let valid = true;

      if (!email || !isValidEmail(email)) {
        setError(emailInput, emailError, "Please enter a valid email address.");
        valid = false;
      }
      if (!password || password.length < 6) {
        setError(passwordInput, passwordError, "Password must be at least 6 characters.");
        valid = false;
      }
      if (!valid) return;

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "dashboard.html";
        } else {
          showAlert(data.message || "Invalid email or password.", "fail");
        }
      } catch {
        showAlert("Cannot reach server. Make sure the backend is running on port 8080.", "fail");
      }
    });
  </script>
</body>
</html>
